services:
  - type: web
    name: timecard-ocr-api
    runtime: ruby
    buildCommand: cd api && bundle install
    startCommand: cd api && bundle exec puma -C config/puma.rb
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: timecard-ocr-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_BUCKET
        value: shimizu-timecard-ocr
      - key: AWS_REGION
        value: ap-southeast-1
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

  - type: web
    name: timecard-ocr-web
    runtime: static
    buildCommand: cd web && npm install && npm run build
    staticPublishPath: web/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: timecard-ocr-db
    plan: free
    databaseName: timecard_ocr
    user: timecard_ocr
