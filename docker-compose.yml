services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: timecard
      POSTGRES_PASSWORD: timecard
      POSTGRES_DB: timecard_development
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
